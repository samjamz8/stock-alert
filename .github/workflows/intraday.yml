name: Intraday Technical Trigger

on:
  schedule:
    # Every 15 min, 9:00-16:00 UTC = ~14:30-21:30 IST window (wide buffer around
    # 9:15-15:30 IST market hours since GitHub cron isn't precise to the minute).
    # Actual market-hours check happens inside run_intraday.py if you add one.
    - cron: "*/15 3 * * 1-5"     # 3:00-3:59 UTC = 8:30-9:29 IST (pre/open)
    - cron: "*/15 4-9 * * 1-5"   # 4:00-9:59 UTC = 9:30-15:29 IST (core hours)
    - cron: "0 10 * * 1-5"       # 10:00 UTC = 15:30 IST (close)
  workflow_dispatch: {}

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pulls the latest shortlist produced by daily.yml. It's a private artifact,
      # never committed to git, so it stays out of the (public) repo history.
      - name: Download latest shortlist artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: daily.yml
          name: shortlist
          path: data
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Run intraday screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python run_intraday.py
